<!DOCTYPE html>
<html>
    <head>
        <title>Student Registration</title>
        <link rel="stylesheet" href="style.css">
        <script src="validate.js"></script>
    </head>

    <body>
        <h1>Student Registration Form</h1>
        <p>This is a page for the student Registration for the annual meet</p>

        <form >
            <h2>Registration Form</h2><br>
            <label> Full Name:</label>
            <input type="text" placeholder="Full Name" id="name"><br><br>

            <label>Email:</label>
            <input type="email" placeholder="Email" id="email"><br><br>

            <label>Date of Birth:</label>
            <input type="date" placeholder="Date of Birth" id="dob"><br><br>

            <label>Gender:</label>
            <input type="radio" name="gender" value="male"/> Male
            <input type="radio" name="gender" value="female"/> Female

            <br><label>Languages Known:</label>
            <input type="checkbox" name="languages" value="english"/> English
            <input type="checkbox" name="languages" value="tamil"/> Tamil
            <input type="checkbox" name="languages" value="hindi"/> Hindi

            <br><label>Course:</label>
            <select name="course" id="course">
                <option value="be">B.E</option>
                <option value="me">M.E</option>
                <option value="mba">MBA</option>
                <option value="mca">MCA</option>
            </select><br><br>

            <input type="submit" value="Submit">
        </form>

        <h2>Facilities</h2>
        <ul>
            <li>Wi-Fi</li>
            <li>Cafeteria</li>
            <li>Library</li>
        </ul>

    </body>
    <footer>
        <p>Jerishwin Joseph 2026</p>
    </footer>
</html>
